package_code: pkg_sales_diagnosis
package_name: Sales Diagnosis Assistant Knowledge Package
commercial_name: Vera / Asistente Inteligente Vera
assistant_instance_code: team360_sales_diagnosis
knowledge_scope_code: ks_team360_sales_diagnosis
service_code: svc_sales_diagnosis
template_code: team360_sales_automation_diagnosis
language: es-AR
status: draft
owner: Team360
description: >
  Knowledge package for Team360's AI sales, automation diagnosis, and automatable process assessment assistant.
  Contains source documents used to support free-text interpretation, slot extraction,
  contextual diagnosis, feasibility scoring, automation recommendations, safety policies,
  commercial objections, and next-step guidance.
notes:
  - Vera is a commercial visible name only and must not be used as a technical core identifier.
  - Markdown is the canonical source format.
  - PDF exports are for human reading only and are not the canonical source.

evolution_policy:
  catalog_type: evolving_knowledge_package
  is_closed_catalog: false
  canonical_source_directory: approved
  draft_directory: drafts
  archive_directory: archive
  principle: >
    This package evolves with real implementations, pilots, commercial tests,
    validated source evidence, and operational learnings. Unvalidated
    opportunities must not be treated as production-proven capabilities.
  evidence_priority:
    - real_implementations
    - professional_inventory
    - pilots
    - commercial_tests
    - product_direction
    - market_language
  ingestion_policy:
    drafts: not_ingested
    approved: ingestable_after_metadata_review
    archive: not_active
validation_strategy:
  first_validation_client: team360_live
  first_validation_client_type: internal_project
  public_entrypoint: team360_public_home
  visible_commercial_name: Vera / Asistente Inteligente Vera
  diagnosis_scope: any_automatable_process
  go_to_market_lens: sales_and_automation_diagnosis
  scope_principle: >
    Sales is the first commercial angle, but diagnosis must evaluate any
    process that may be automated. Technical automatable status must be
    separated from current commercial offer readiness.
  stage_1_knowledge_operations:
    source_mode: curated_documents
    update_mode: controlled_load_update_script
    admin_ui_required: false
    principle: >
      A complete knowledge administration interface is not required for the
      first validation stage. Curated documents plus a controlled load/update
      flow are enough until real usage validates the administration needs.
  learning_loop:
    - prueba
    - aprendizaje
    - curaduria
    - update
    - nueva_prueba
  review_rule: >
    Public or internal test learnings do not become approved knowledge
    automatically. They must be curated, classified, validated, and bounded
    before promotion to approved.
allowed_offer_decisions:
  - automatable
  - sellable_now
  - pilot
  - future_opportunity
  - human_review_required
allowed_evidence_levels:
  - hypothesis
  - validated_by_source
  - validated_by_pilot
  - validated_by_production
  - deprecated
allowed_commercial_statuses:
  - exploratory
  - sellable_pilot
  - sellable_service
  - core_offer
  - future_package
  - not_offered
allowed_implementation_statuses:
  - not_implemented
  - prototype
  - pilot_done
  - production_client
  - paused
  - deprecated
allowed_service_maturity:
  - CORE_VALIDADO
  - PILOTO_VALIDADO
  - OPORTUNIDAD
  - PAQUETE_FUTURO
  - NO_OFRECER_AUN
metadata_requirements:
  required_for_approved:
    - evidence_level
    - evidence_sources
    - implementation_status
    - commercial_status
    - service_maturity
    - offer_decision
    - review_cycle
    - last_validated_at
    - validated_by
    - risk_level
    - approval_notes
  optional_or_contextual:
    - related_pilots
    - related_clients
  empty_list_when_not_applicable:
    - related_pilots
    - related_clients
